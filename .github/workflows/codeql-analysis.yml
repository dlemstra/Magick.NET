on:
  workflow_dispatch:
  schedule:
  - cron: 0 6 * * *
  push:
    branches:
    - main
    paths:
    - .github/workflows/codeql-analysis.yml

permissions: {}

name: Codeql analysis
jobs:
  csharp:
    name: CodeQL analysis (C#)
    runs-on: windows-2025-vs2026

    permissions:
      contents: read
      packages: read
      security-events: write

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 #v7.0.0
        with:
          persist-credentials: false

      - name: Install resources
        run: ./install.resources.sh x64 Q16-HDRI
        working-directory: src/Magick.Native
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Initialize CodeQL
        uses: github/codeql-action/init@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 #4.37.0
        with:
          languages: csharp

      - name: Build Magick.NET (Release)
        run: ./build.Magick.NET.cmd Q16-HDRI "x64" Release
        working-directory: build/windows

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@7188fc363630916deb702c7fdcf4e481b751f97a #4.37.1

  actions:
    name: CodeQL analysis (GitHub Actions)
    runs-on: ubuntu-24.04

    permissions:
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 #v7.0.0
        with:
          persist-credentials: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 #4.37.0
        with:
          languages: actions

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@7188fc363630916deb702c7fdcf4e481b751f97a #4.37.1
