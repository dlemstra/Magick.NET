on:
  workflow_dispatch:
  schedule:
  - cron: 0 6 * * *
  push:
    branches:
    - main
    paths:
    - .github/workflows/codeql-analysis.yml

permissions: {}

name: Codeql analysis
jobs:
  csharp:
    name: CodeQL analysis (C#)
    runs-on: windows-2025-vs2026

    permissions:
      contents: read
      packages: read
      security-events: write

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 #v6.0.3
        with:
          persist-credentials: false

      - name: Install NuGet
        run: ./install.nuget.cmd
        working-directory: build/windows

      - name: Create nuget.config
        run: ./create-nuget-config.cmd "dlemstra" "${{ secrets.GITHUB_TOKEN }}"
        working-directory: src/Magick.Native

      - name: Install Magick.Native
        run: ./install.cmd
        working-directory: src/Magick.Native

      - name: Initialize CodeQL
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e #4.36.2
        with:
          languages: csharp

      - name: Build Magick.NET (Release)
        run: ./build.Magick.NET.cmd Q16-HDRI "x64" Release
        working-directory: build/windows

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e #4.36.2

  actions:
    name: CodeQL analysis (GitHub Actions)
    runs-on: ubuntu-24.04

    permissions:
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 #v6.0.3
        with:
          persist-credentials: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e #4.36.2
        with:
          languages: actions

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e #4.36.2
