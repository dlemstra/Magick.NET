version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    cooldown:
      default-days: 7
    schedule:
      interval: "daily"
    groups:
      codeql-action:
        patterns:
          - "github/codeql-action/*"
  - package-ecosystem: "nuget"
    directory: "/"
    cooldown:
      default-days: 7
    schedule:
      interval: "daily"
